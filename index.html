
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPulse - Video Betting Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neon: {
                pink: '#ff2d7a',
                blue: '#38bdf8',
                cyan: '#22d3ee',
                violet: '#8b5cf6',
                success: '#2ee6b8'
              }
            },
            boxShadow: {
              'neon-pink': '0 10px 30px rgba(255,45,122,.28)',
              'neon-violet': '0 10px 30px rgba(139,92,246,.28)'
            }
          }
        }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        html, body { height: 100%; overflow-x: hidden; overflow-y: auto; }
        #root { min-height: 100%; }
        .snap-y {
            scroll-snap-type: y mandatory;
        }
        .snap-start {
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }
        /* Smooth Scrolling */
        * {
            scroll-behavior: smooth;
        }
        html {
            scroll-behavior: smooth;
        }
        /* Smooth momentum scrolling for iOS */
        @supports (-webkit-overflow-scrolling: touch) {
            * {
                -webkit-overflow-scrolling: touch;
            }
        }
        /* Hide Scrollbar Globally - Maintains scroll functionality */
        html, body {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
        /* Hide scrollbar for all elements */
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }
        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Custom Scrollbar for Sidebar */
        .sidebar-scrollbar { scrollbar-width: thin; scrollbar-color: #8b5cf6 #1f1636; }
        .sidebar-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-scrollbar::-webkit-scrollbar-track {
            background: #1f1636;
            border-radius: 10px;
        }
        .sidebar-scrollbar::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
        .sidebar-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff2d7a;
        }
        /* Toast Animations */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
